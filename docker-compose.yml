# docker-compose.yml - Orquestrador de containers
#
# Define como os containers da aplicação devem ser criados e configurados.
# Para subir o ambiente: docker compose up --build
# Para derrubar:         docker compose down
name: taskapi-devops

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped