name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest pytest-cov

      - name: Lint
        run: |
          flake8 .

      - name: Format check
        run: |
          black --check .

      - name: Run tests
        run: |
          pytest --cov=app --cov-report=xml

      - name: Upload coverage to actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build_and_push:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy_staging:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging (example)
        run: echo "Aqui você roda seu script de deploy p/ staging (ssh, kubectl, etc.)"

  deploy_production:
    needs: deploy_staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://your-production.example
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Manual approval
        uses: peter-evans/slash-command-dispatch@v2
      - name: Deploy to production
        run: echo "Deploy para produção (após aprovação manual)"